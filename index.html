    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        ::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        body { margin: 0; padding: 0; background-color: #FFFBF0; color: #4B5563; font-family: 'ZCOOL QingKe HuangYou', sans-serif; overflow-x: hidden; }
        h1, h2, h3, .font-title { font-family: 'ZCOOL KuaiLe', cursive; }

        .bg-dream { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; background: linear-gradient(180deg, #FFFDF8 0%, #FFE4E6 100%); }
        .bg-dream::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(#FDA4AF 1.5px, transparent 1.5px); background-size: 35px 35px; opacity: 0.12; }
        .bg-element { position: absolute; opacity: 0.8; }
        .bg-star1 { top: 18%; left: 15%; width: 25px; animation: twinkle 3s ease-in-out infinite alternate; }
        .bg-star2 { top: 60%; right: 12%; width: 22px; animation: twinkle 4s ease-in-out infinite alternate 1s; }
        .bg-star3 { top: 80%; left: 8%; width: 16px; animation: twinkle 2.5s ease-in-out infinite alternate 0.5s; }
        .fish-wrap { position: absolute; top: 68%; left: -200px; animation: swimPath 28s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .koi-fish { width: 130px; animation: fishFloat 3s ease-in-out infinite alternate; filter: drop-shadow(0px 8px 12px rgba(253,164,175,0.5)); }
        .dream-bubble { position: absolute; opacity: 0; animation: floatUp 4s ease-in infinite; }
        .db1 { width: 16px; height: 16px; left: 115px; top: 30px; animation-delay: 0.2s; }
        .db2 { width: 24px; height: 24px; left: 135px; top: 15px; animation-delay: 1.5s; }
        .db3 { width: 14px; height: 14px; left: 120px; top: 40px; animation-delay: 2.8s; }

        @keyframes swimPath { 0% { transform: translate(-200px, 0) rotate(5deg); } 48% { transform: translate(110vw, -80px) rotate(-5deg); } 50% { transform: translate(110vw, -80px) scaleX(-1) rotate(-5deg); } 98% { transform: translate(-200px, 50px) scaleX(-1) rotate(5deg); } 100% { transform: translate(-200px, 50px) rotate(5deg); } }
        @keyframes fishFloat { 0% { transform: rotate(-5deg) translateY(-6px); } 100% { transform: rotate(5deg) translateY(6px); } }
        @keyframes floatUp { 0% { transform: translateY(0) scale(0.5); opacity: 0; } 30% { opacity: 1; transform: translateY(-30px) scale(1.1); } 100% { transform: translateY(-200px) scale(1.5) translateX(-25px); opacity: 0; } }
        @keyframes twinkle { 0% { transform: scale(0.8); opacity: 0.4; } 100% { transform: scale(1.2); opacity: 0.9; } }

        .cloud-title-container { position: relative; display: inline-flex; align-items: center; justify-content: center; padding: 15px 35px; margin-top: 15px; white-space: nowrap; max-width: 100%; }
        .cloud-bg { position: absolute; inset: 0; filter: drop-shadow(0px 6px 0px #FDA4AF); animation: cloudBob 4s ease-in-out infinite alternate; z-index: -1; }
        .hero-title { font-size: 2.2rem; font-weight: 900; color: #4B5563; letter-spacing: 2px; transform: rotate(-2deg); text-shadow: 2px 2px 0px #fff, -2px -2px 0px #fff, 0px 4px 0px #FDE047; white-space: nowrap; }
        .title-sun { position: absolute; top: -5px; left: 0px; width: 45px; animation: slowSpin 15s linear infinite; z-index: 10; }
        .title-moon { position: absolute; bottom: -5px; right: 0px; width: 40px; animation: moonRock 5s ease-in-out infinite alternate; z-index: 10; }
        
        @keyframes cloudBob { 0% { transform: translateY(-3px); } 100% { transform: translateY(3px); } }
        @keyframes slowSpin { 100% { transform: rotate(360deg); } }
        @keyframes moonRock { 0% { transform: rotate(-12deg); } 100% { transform: rotate(12deg); } }

        .card-soft { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 28px; box-shadow: 0 8px 25px rgba(253,164,175,0.2); border: 2px solid white; max-width: 100%; overflow: hidden; }
        .btn-cute { border: 2px solid #FDA4AF; box-shadow: 0 4px 10px rgba(253,164,175,0.25); transition: all 0.15s; border-radius: 18px; font-weight: bold; background: white; color: #4B5563; }
        .btn-cute:active { transform: translateY(3px); box-shadow: 0 0 0 rgba(253,164,175,0); }
        .btn-cute.selected { background-color: #FFE4E6; border: 2px solid #F43F5E; color: #E11D48; }

        .calendar-cell { height: 98px; padding: 4px; display: flex; flex-direction: column; align-items: center; background: rgba(255,255,255,0.8); border-radius: 20px; transition: all 0.2s; box-shadow: 0 4px 10px rgba(253,164,175,0.1); position: relative; }
        .calendar-cell.today { background: rgba(253, 164, 175, 0.25); box-shadow: 0 0 0 3px #FDA4AF inset; }
        .date-num { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-size: 1.15rem; font-weight: 900; border-radius: 50%; z-index: 2; flex-shrink: 0; font-family: 'ZCOOL KuaiLe', cursive; }
        .date-num.has-period { background-color: white; color: #E11D48; border: 3px solid #FDA4AF; box-shadow: 0 4px 8px rgba(253,164,175,0.4); }
        .icon-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 2px; width: 100%; height: 35px; align-content: flex-start; overflow: hidden; margin-top: 1px; }
        .sport-pill { position: absolute; bottom: 3px; left: 50%; width: 105%; margin-left: -52.5%; transform: scale(0.9); transform-origin: bottom center; background: white; border-radius: 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2px 2px 1px 2px; font-weight: 900; color: #4B5563; box-shadow: 0 2px 6px rgba(253,164,175,0.4); border: 1.5px solid #FDA4AF; z-index: 10; white-space: nowrap; }

        .nav-btn svg { transition: all 0.3s; }
        .nav-btn.active { color: #F43F5E; }
        .nav-btn.active svg { animation: ultraJelly 1.5s infinite; transform-origin: bottom center; filter: drop-shadow(0px 6px 4px rgba(244,63,94,0.3)); }
        @keyframes ultraJelly { 0%, 100% { transform: scale(1, 1) translateY(0); } 15% { transform: scale(1.3, 0.7) translateY(4px); } 35% { transform: scale(0.7, 1.3) translateY(-14px); } 55% { transform: scale(1.1, 0.9) translateY(0); } 75% { transform: scale(0.95, 1.05) translateY(-3px); } }

        .privacy-blur { filter: blur(12px); transition: filter 0.3s ease; cursor: pointer; }
        .privacy-blur.revealed { filter: blur(0px); }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 32px; width: 32px; background: #fff; border: 4px solid #FDA4AF; border-radius: 50%; box-shadow: 0 4px 8px rgba(253,164,175,0.4); margin-top: -12px; cursor: pointer; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 10px; background: #FFE4E6; border-radius: 10px; }
        .tab-content { display: none; padding-bottom: 120px; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .nav-safe-area { padding-bottom: calc(env(safe-area-inset-bottom) + 16px); }

        @keyframes fallConfetti { 0% { transform: translateY(-10vh) rotate(0deg) scale(0.8); opacity: 1; } 100% { transform: translateY(110vh) rotate(360deg) scale(1.2); opacity: 0; } }
        .confetti-flake { position: absolute; top: -20px; animation: fallConfetti linear forwards; pointer-events: none; z-index: 9999; filter: drop-shadow(0px 4px 6px rgba(253,164,175,0.6)); }
    </style>
</head>

    <!-- 顶层提示层 -->
    <div id="toast" class="fixed top-[15%] left-1/2 -translate-x-1/2 bg-white/90 backdrop-blur text-theme-ink px-6 py-3 rounded-2xl font-bold border-2 border-theme-pink shadow-soft opacity-0 pointer-events-none transform -translate-y-4 transition-all z-[99999] flex items-center gap-2 whitespace-nowrap shrink-0"></div>

    <script>
        let currDate = new Date(); let selDateStr = fmtDate(currDate); let curSport = ''; let chartObj = null;
        let confettiFired = false; 

        // 底层数据绑定的格式仍然保留 YYYY-MM-DD，这是HTML <input type="date"> 的硬性要求
        function fmtDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
        
        // ✨ 新增展示专用格式化方法：将 YYYY-MM-DD 转换为 YYYY/MM/DD 供所有纯文本展示使用
        function dispDate(dStr) { return dStr ? dStr.replace(/-/g, '/') : ''; }
        
        function showToast(msg) { 
            const t = document.getElementById('toast'); 
            t.innerHTML = `<svg class="w-5 h-5 text-yellow-400 shrink-0" viewBox="0 0 100 100"><use href="#icon-cf-star"></use></svg> <span class="whitespace-nowrap">${msg}</span>`; 
            t.classList.remove('opacity-0', '-translate-y-4'); t.classList.add('opacity-100', 'translate-y-0'); 
            setTimeout(() => { t.classList.add('opacity-0', '-translate-y-4'); t.classList.remove('opacity-100', 'translate-y-0'); }, 2000); 
        }
        
        function compressImg(file, cb) { const r = new FileReader(); r.onload = e => { const img = new Image(); img.onload = () => { const cvs = document.createElement('canvas'); const max = 800; let w = img.width, h = img.height; if(w > max) { h = Math.round(h*max/w); w = max; } cvs.width = w; cvs.height = h; cvs.getContext('2d').drawImage(img, 0, 0, w, h); cb(cvs.toDataURL('image/jpeg', 0.8)); }; img.src = e.target.result; }; r.readAsDataURL(file); }

        const DB = { db: null, init() { return new Promise(r => { const req = indexedDB.open('HaoDB_V8', 1); req.onupgradeneeded = e => { let d = e.target.result; if(!d.objectStoreNames.contains('daily')) d.createObjectStore('daily', {keyPath: 'date'}); if(!d.objectStoreNames.contains('ovu')) d.createObjectStore('ovu', {keyPath: 'id', autoIncrement: true}); if(!d.objectStoreNames.contains('health2')) d.createObjectStore('health2', {keyPath: 'id', autoIncrement: true}); }; req.onsuccess = e => { this.db = e.target.result; r(); }; }); }, get(s, k) { return new Promise(r => { const req = this.db.transaction(s).objectStore(s).get(k); req.onsuccess = ()=>r(req.result); }); }, put(s, d) { return new Promise(r => { const tx = this.db.transaction(s, 'readwrite'); tx.objectStore(s).put(d); tx.oncomplete = ()=>r(); }); }, add(s, d) { return new Promise(r => { const tx = this.db.transaction(s, 'readwrite'); tx.objectStore(s).add(d); tx.oncomplete = ()=>r(); }); }, getAll(s) { return new Promise(r => { const req = this.db.transaction(s).objectStore(s).getAll(); req.onsuccess = ()=>r(req.result); }); }, del(s, i) { return new Promise(r => { const tx = this.db.transaction(s, 'readwrite'); tx.objectStore(s).delete(i); tx.oncomplete = ()=>r(); }); } };

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById(`nav-${tab}`).classList.add('active');
            if(tab==='calendar') renderCal();
            if(tab==='sport') { document.getElementById('sport-date').value = fmtDate(new Date()); confettiFired = false; }
            if(tab==='health') syncHealthTab();
            if(tab==='ovulation') loadOvu();
            if(tab==='data') renderChart();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        /* 1. 日历防溢出与重新映射的新版白带 */
        function getMiniSportIconId(t) { return t==='单车'?'mini-bike':t==='跳操'?'mini-dance':t==='爬楼'?'mini-stair':'mini-custom'; }
        async function renderCal() {
            const y = currDate.getFullYear(), m = currDate.getMonth() + 1;
            document.getElementById('current-month-display').textContent = `${y}/${String(m).padStart(2,'0')}`;
            const grid = document.getElementById('calendar-grid'); grid.innerHTML = '';
            const firstD = new Date(y, m-1, 1).getDay(); const days = new Date(y, m, 0).getDate();
            const todayStr = fmtDate(new Date());
            const allData = await DB.getAll('daily'); const dMap = {}; allData.forEach(d => dMap[d.date] = d);
            for(let i=0; i<firstD; i++) grid.innerHTML += `<div></div>`;
            for(let d=1; d<=days; d++) {
                const dStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const dt = dMap[dStr] || {};
                let cellCls = "calendar-cell cursor-pointer"; if(dStr === todayStr) cellCls += " today";
                let numCls = "date-num"; if(dt.period) numCls += " has-period";
                let icHTML = `<div class="icon-grid">`;
                if(dt.period==='natural') icHTML+=`<svg class="w-4 h-4 shrink-0"><use href="#icon-blood-nat"></use></svg>`;
                if(dt.period==='medicine') icHTML+=`<svg class="w-4 h-4 shrink-0"><use href="#icon-blood-med"></use></svg>`;
                if(dt.sex) icHTML+=`<svg class="w-4 h-4 shrink-0"><use href="#icon-hearts"></use></svg>`;
                if(dt.ovulationDay) icHTML+=`<svg class="w-4 h-4 shrink-0"><use href="#icon-sprout"></use></svg>`;
                if(dt.breast) icHTML+=`<svg class="w-3.5 h-3.5 shrink-0"><use href="#icon-boob-${dt.breast}"></use></svg>`;
                if(dt.discharge && dt.discharge!=='无'){ let map={'拉丝':1,'水样':2,'豆腐渣':3}; icHTML+=`<svg class="w-3.5 h-3.5 shrink-0"><use href="#icon-dis-${map[dt.discharge]}"></use></svg>`; }
                icHTML += `</div>`;
                let spHTML = '';
                if(dt.sport && dt.sport.length>0) {
                    let s = dt.sport[0]; let miniId = getMiniSportIconId(s.type);
                    spHTML = `<div class="sport-pill"><div class="flex items-center gap-0.5"><svg class="w-3 h-3 text-theme-ink flex-shrink-0"><use href="#${miniId}"></use></svg><span class="text-[10px] leading-none whitespace-nowrap">${s.dur}m</span></div><div class="text-[8.5px] text-theme-red leading-none pb-0.5 whitespace-nowrap">${s.cal}k</div></div>`;
                }
                grid.innerHTML += `<div class="${cellCls}" onclick="openModal('${dStr}')"><div class="${numCls}">${d}</div>${icHTML}${spHTML}</div>`;
            }
        }
        function changeMonth(off) { currDate.setMonth(currDate.getMonth()+off); renderCal(); }

        async function openModal(ds) {
            selDateStr = ds; 
            document.getElementById('modal-date-title').textContent = `打卡 ${dispDate(ds)}`;
            const dt = (await DB.get('daily', ds)) || {date: ds};
            document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('selected', 'bg-theme-pink'));
            if(dt.period === 'natural') document.getElementById('btn-period-nat').classList.add('selected');
            if(dt.period === 'medicine') document.getElementById('btn-period-med').classList.add('selected');
            document.getElementById('btn-sex').classList.toggle('selected', !!dt.sex);
            document.getElementById('btn-ovulation').classList.toggle('selected', !!dt.ovulationDay);
            document.querySelectorAll('.breast-btn').forEach(b => b.classList.toggle('selected', parseInt(b.dataset.val) === (dt.breast||0)));
            document.querySelectorAll('.dis-btn').forEach(b => b.classList.toggle('selected', b.dataset.val === dt.discharge));
            const imgWrap = document.getElementById('discharge-img-wrap'); const imgPrev = document.getElementById('discharge-img-prev');
            if(dt.dischargeImg) { imgPrev.src = dt.dischargeImg; imgPrev.classList.add('privacy-blur'); imgPrev.classList.remove('revealed'); imgWrap.classList.remove('hidden'); } else { imgWrap.classList.add('hidden'); }
            document.getElementById('modal-daily').classList.remove('hidden'); document.getElementById('modal-daily').classList.add('flex');
        }
        function closeDailyModal() { document.getElementById('modal-daily').classList.add('hidden'); renderCal(); }
        async function updateDaily(k, v) { let d = (await DB.get('daily', selDateStr)) || {date: selDateStr}; d[k] = v; await DB.put('daily', d); }
        async function setPeriod(t) { let d = (await DB.get('daily', selDateStr)) || {date: selDateStr}; d.period = (d.period===t)?null:t; await DB.put('daily', d); openModal(selDateStr); showToast(d.period==='natural'?'已记录自主月经':d.period==='medicine'?'已记录用药月经':'已取消月经记录'); }
        async function toggleData(k) { let d = (await DB.get('daily', selDateStr)) || {date: selDateStr}; d[k] = !d[k]; await DB.put('daily', d); openModal(selDateStr); let n = k==='sex'?'同房':'排卵日'; showToast(d[k]?`已记录${n}`:`已取消${n}`); }
        async function setBreast(l) { let d = (await DB.get('daily', selDateStr)) || {date: selDateStr}; d.breast = (d.breast===l)?0:l; await DB.put('daily', d); openModal(selDateStr); showToast(d.breast?'已记录胸痛等级':'已取消胸痛记录'); }
        async function setDischarge(t) { let d = (await DB.get('daily', selDateStr)) || {date: selDateStr}; d.discharge = (d.discharge===t)?'无':t; await DB.put('daily', d); openModal(selDateStr); showToast(d.discharge==='无'?'已取消白带记录':`已记录${d.discharge}白带`); }
        function uploadDischargeImg(input) { if(input.files[0]) { compressImg(input.files[0], async (base64) => { await updateDaily('dischargeImg', base64); showToast('留底照已添加'); openModal(selDateStr); }); } }
        async function delDischargeImg() { if(confirm('删除这张留底照？')) { await updateDaily('dischargeImg', null); showToast('照片已删除'); openModal(selDateStr); } }
        async function clearDailyRecords() { if(confirm('确定清空本日起始记忆吗？')){ await DB.put('daily', {date: selDateStr}); closeDailyModal(); showToast('记忆已清空'); } }

        /* ================= 4. 排卵试纸真·智能填充不留黑边裁切逻辑 ================= */
        function switchOvuTab(t){ 
            document.getElementById('sec-strip').classList.toggle('hidden',t!=='strip'); 
            document.getElementById('sec-bus').classList.toggle('hidden',t!=='bus'); 
            document.getElementById('tb-strip').classList.toggle('bg-theme-pink',t==='strip'); 
            document.getElementById('tb-strip').classList.toggle('bg-white',t!=='strip'); 
            document.getElementById('tb-bus').classList.toggle('bg-theme-pink',t==='bus'); 
            document.getElementById('tb-bus').classList.toggle('bg-white',t!=='bus');

        let ovuInputRaw = document.getElementById('ovu-img-input');
        let ovuInputReset = document.getElementById('ovu-img-input-reset');
        let ovuImgRaw = document.getElementById('ovu-img-raw');
        
        function handleOvuUpload(e) {
            if(e.target.files[0]) {
                const r = new FileReader();
                r.onload = ev => {
                    ovuImgRaw.src = ev.target.result;
                    document.getElementById('ovu-placeholder').classList.add('hidden');
                    document.getElementById('ovu-crop-wrap').classList.remove('hidden');
                    
                    ovuImgRaw.onload = () => {
                        let sa = document.getElementById('ovu-scroll-area');
                        let imgRatio = ovuImgRaw.naturalWidth / ovuImgRaw.naturalHeight;
                        let saRatio = sa.clientWidth / sa.clientHeight;
                        
                        if(imgRatio > saRatio) {
                            ovuImgRaw.style.height = sa.clientHeight + 'px';
                            ovuImgRaw.style.width = 'auto';
                        } 
                        else {
                            ovuImgRaw.style.width = sa.clientWidth + 'px';
                            ovuImgRaw.style.height = 'auto';
                        }
                        
                        setTimeout(() => {
                            sa.scrollTop = Math.max(0, (ovuImgRaw.clientHeight - sa.clientHeight) / 2);
                            sa.scrollLeft = Math.max(0, (ovuImgRaw.clientWidth - sa.clientWidth) / 2);
                        }, 50);
                    };
                }; r.readAsDataURL(e.target.files[0]);
            }
        }
        ovuInputRaw.addEventListener('change', handleOvuUpload);
        ovuInputReset.addEventListener('change', handleOvuUpload);

        async function saveOvu(type) {
            let rec = { type: type };
            if(type==='strip') { 
                if(!ovuImgRaw.src || ovuImgRaw.src.endsWith('index.html')) return showToast('请先添加试纸照片呀');
                const scrollArea = document.getElementById('ovu-scroll-area');
                const cvs = document.createElement('canvas');
                cvs.width = scrollArea.clientWidth; 
                cvs.height = scrollArea.clientHeight;
                const ctx = cvs.getContext('2d');
                
                const scaleX = ovuImgRaw.naturalWidth / ovuImgRaw.clientWidth;
                const scaleY = ovuImgRaw.naturalHeight / ovuImgRaw.clientHeight;
                
                ctx.drawImage(
                    ovuImgRaw, 
                    scrollArea.scrollLeft * scaleX, 
                    scrollArea.scrollTop * scaleY, 
                    cvs.width * scaleX, 
                    cvs.height * scaleY, 
                    0, 0, cvs.width, cvs.height
                );
                
                rec.img = cvs.toDataURL('image/jpeg', 0.85); 
                rec.res = document.getElementById('ovu-res').value; 
                rec.cd = document.getElementById('ovu-cd').value || '?';
                rec.date = document.getElementById('ovu-strip-date').value || fmtDate(new Date());
                
                document.getElementById('ovu-placeholder').classList.remove('hidden');
                document.getElementById('ovu-crop-wrap').classList.add('hidden');
                ovuImgRaw.src = ''; ovuImgRaw.style.width=''; ovuImgRaw.style.height=''; ovuInputRaw.value = ''; ovuInputReset.value = '';
            } else { 
                rec.date=document.getElementById('bus-d').value||fmtDate(new Date()); 
                rec.cd=document.getElementById('bus-cd').value; 
                rec.d1=document.getElementById('bus-en').value; 
                rec.d2=document.getElementById('bus-r').value; 
                rec.d3=document.getElementById('bus-l').value; 
            }
            await DB.add('ovu', rec); showToast(type==='strip'?'已完美裁剪上墙':'监测记录已保存'); loadOvu();
        }

        async function loadOvu() {
            document.getElementById('ovu-strip-date').value = fmtDate(new Date());
            document.getElementById('bus-d').value = fmtDate(new Date());

            const l = await DB.getAll('ovu'); 
            let hStrip = '', hBus = '';
            l.forEach(i => {
                let dHTML = '';
                let badgeHTML = (cd) => `<span class="font-bold text-xs bg-theme-pink/30 text-theme-ink px-2 py-0.5 rounded border border-theme-pink whitespace-nowrap shrink-0 w-fit">月经第${cd}天</span>`;
                
                if(i.type==='strip') {
                    dHTML = `<div class="flex flex-col flex-1 min-w-0"><div class="flex justify-between items-center mb-1 gap-2">${badgeHTML(i.cd||'?')}<span class="font-bold text-base tracking-widest whitespace-nowrap shrink-0 ${i.res==='强阳'?'text-theme-red':'text-theme-ink'}">${i.res}</span></div><img src="${i.img}" class="w-full h-12 object-cover rounded shadow-sm border border-gray-200"></div>`;
                    hStrip += `<div class="card-soft p-3 flex relative shadow-none border-2 border-gray-100 bg-white gap-2"><button onclick="DB.del('ovu',${i.id});loadOvu()" class="absolute top-2 right-2 text-gray-300 shrink-0"><svg class="w-5 h-5 text-gray-400 shrink-0"><use href="#icon-trash"></use></svg></button><div class="mr-1 font-bold bg-theme-ink text-white px-2 py-1 rounded-xl text-[11px] h-fit whitespace-nowrap shrink-0">${dispDate(i.date)}</div><div class="flex-1 min-w-0">${dHTML}</div></div>`;
                } else {
                    let cdHeader = i.cd ? `<div class="mb-1.5">${badgeHTML(i.cd)}</div>` : '';
                    dHTML = `<div class="font-bold flex flex-col gap-1 text-sm text-theme-ink">${cdHeader}<div>内膜: ${i.d1||'-'} mm</div><div>右: ${i.d2||'无'}</div><div>左: ${i.d3||'无'}</div></div>`;
                    hBus += `<div class="card-soft p-3 flex relative shadow-none border-2 border-gray-100 bg-white gap-2"><button onclick="DB.del('ovu',${i.id});loadOvu()" class="absolute top-2 right-2 text-gray-300 shrink-0"><svg class="w-5 h-5 text-gray-400 shrink-0"><use href="#icon-trash"></use></svg></button><div class="mr-1 font-bold bg-theme-ink text-white px-2 py-1 rounded-xl text-[11px] h-fit whitespace-nowrap shrink-0">${dispDate(i.date)}</div><div class="flex-1 min-w-0">${dHTML}</div></div>`;
                }
            }); 
            document.getElementById('ovu-timeline-strip').innerHTML = hStrip || '<div class="text-center text-sm font-bold text-theme-ink/40 py-4">墙上空空如也~</div>';
            document.getElementById('ovu-timeline-bus').innerHTML = hBus || '<div class="text-center text-sm font-bold text-theme-ink/40 py-4">暂无监测记录~</div>';
        }

        /* 档案相关 */
        function switchHealthMod(m) { document.getElementById('h-sec-breast').classList.toggle('hidden', m!=='breast'); document.getElementById('h-sec-pcos').classList.toggle('hidden', m!=='pcos'); document.getElementById('hmod-breast').classList.toggle('bg-theme-pink', m==='breast'); document.getElementById('hmod-breast').classList.toggle('bg-white', m!=='breast'); document.getElementById('hmod-pcos').classList.toggle('bg-theme-pink', m==='pcos'); document.getElementById('hmod-pcos').classList.toggle('bg-white', m!=='pcos'); }
        function togglePcosFields() { const v = document.getElementById('pcos-type').value; document.getElementById('pcos-fields-hormone').classList.toggle('hidden', v!=='激素六项'); document.getElementById('pcos-fields-amh').classList.toggle('hidden', v!=='AMH'); document.getElementById('pcos-fields-bus').classList.toggle('hidden', v!=='B超'); document.getElementById('pcos-fields-sugar').classList.toggle('hidden', v!=='糖耐'); }
        function previewImg(inp, id) { if(inp.files[0]) compressImg(inp.files[0], b => { tmpHealthB64=b; document.getElementById(id).style.backgroundImage=`url(${b})`; document.getElementById(id).classList.remove('hidden'); }); }
        let tmpHealthB64 = null;
        async function syncHealthTab() { document.getElementById('br-date').value = fmtDate(new Date()); document.getElementById('pc-date').value = fmtDate(new Date()); loadHealthWall(); }
        async function syncBreastSlider(val) { await updateDaily('breast', parseInt(val)); showToast('痛感已同步至日历'); }
        
        async function saveHealthRec(mod) {
            let rec = { category: mod, timestamp: Date.now(), img: tmpHealthB64 };
            if(mod === 'breast') { 
                rec.checkDate = document.getElementById('br-date').value; 
                rec.reviewDate = document.getElementById('br-review').value; 
                rec.cd = document.getElementById('br-cd').value;

                rec.reviewDate = document.getElementById('pc-review').value;

                let d = {}; if(rec.type==='激素六项') { d.lh=document.getElementById('pc-lh').value; d.fsh=document.getElementById('pc-fsh').value; d.e2=document.getElementById('pc-e2').value; } else if(rec.type==='AMH') d.amh=document.getElementById('pc-amh').value; else if(rec.type==='B超') { d.en=document.getElementById('pc-bus-en').value; d.fol=document.getElementById('pc-bus-fol').value; } else if(rec.type==='糖耐') { d.glu0=document.getElementById('pc-glu0').value; d.ins0=document.getElementById('pc-ins0').value; } rec.data = d;
            }
            await DB.add('health2', rec); showToast('单据已稳妥收入档案'); tmpHealthB64=null; document.getElementById('br-img-prev').classList.add('hidden'); document.getElementById('pc-img-prev').classList.add('hidden'); loadHealthWall(); 
        }
        
        async function loadHealthWall() {
            let list = await DB.getAll('health2'); list.sort((a,b)=>b.timestamp-a.timestamp); 
            let hBreast = ''; let hPcos = '';
            list.forEach(i => { 
                let imgH = i.img ? `<img src="${i.img}" class="w-16 h-16 object-cover rounded-lg filter blur-[4px] active:blur-none border-2 border-theme-ink shrink-0" onclick="this.classList.toggle('blur-[4px]')">` : `<div class="w-16 h-16 bg-gray-100 rounded-lg flex items-center justify-center text-xs text-gray-400 shrink-0 whitespace-nowrap">无图</div>`; 
                let dataH = ''; if(i.data) { if(i.type==='激素六项') dataH = `LH:${i.data.lh||'-'} FSH:${i.data.fsh||'-'}`; if(i.type==='AMH') dataH = `AMH:${i.data.amh||'-'}`; if(i.type==='B超') dataH = `内膜:${i.data.en||'-'} 卵泡:${i.data.fol||'-'}`; }
                let cdStr = i.cd ? `<span class="bg-theme-mint/30 px-1 rounded ml-1 font-bold whitespace-nowrap">月经第${i.cd}天</span>` : '';
                
                let itemHTML = `<div class="card-soft p-3 flex gap-3 relative shadow-none border-2 border-gray-100 bg-white"><button onclick="DB.del('health2',${i.id});loadHealthWall()" class="absolute top-2 right-2 text-theme-red shrink-0"><svg class="w-5 h-5 text-theme-red shrink-0"><use href="#icon-trash"></use></svg></button>${imgH}<div class="flex-1 min-w-0 text-sm font-bold"><div class="text-base text-theme-ink border-b-2 border-theme-ink/10 pb-1 mb-1 flex items-center gap-1 text-theme-ink whitespace-nowrap">${i.type}${cdStr}</div><div class="whitespace-nowrap">检查: ${dispDate(i.checkDate)}</div><div class="text-theme-red whitespace-nowrap">复查: ${dispDate(i.reviewDate)}</div><div class="text-theme-ink/70 mt-1 truncate">${dataH}</div></div></div>`;
                
                if (i.category === 'breast' || i.type === '乳腺检查') {
                    hBreast += itemHTML;
                } else {
                    hPcos += itemHTML;
                }
            }); 
            document.getElementById('health-records-wall-breast').innerHTML = hBreast || '<div class="text-center text-gray-400 py-4 font-bold text-sm whitespace-nowrap">暂无乳腺单据记录</div>';
            document.getElementById('health-records-wall-pcos').innerHTML = hPcos || '<div class="text-center text-gray-400 py-4 font-bold text-sm whitespace-nowrap">暂无多囊单据记录</div>';
        }

        /* ================= 6. 猫爪步数与全屏纯手绘特效 ================= */
        function pickSport(t) { curSport = t==='custom'?document.getElementById('sp-cust').value:t; document.querySelectorAll('.sp-btn').forEach(b=>b.classList.remove('selected','border-pink-300')); if(t!=='custom'){document.getElementById(`sp-${t}`).classList.add('selected','border-pink-300'); document.getElementById('sp-cust').value='';} }
        
        function updatePawProgress() {
            let steps = parseInt(document.getElementById('sp-steps').value) || 0;
            let activePaws = Math.min(5, Math.floor(steps / 2000));
            for(let i=1; i<=5; i++) {
                let p = document.getElementById('paw-'+i);
                if(i <= activePaws) { p.classList.add('text-theme-pink'); p.classList.remove('text-gray-300'); }
                else { p.classList.remove('text-theme-pink'); p.classList.add('text-gray-300'); }
            }
            if(steps >= 10000 && !confettiFired) { confettiFired = true; triggerConfettiEffect(); }
        }

        function triggerConfettiEffect() {
            const container = document.createElement('div'); container.className = 'fixed inset-0 pointer-events-none z-[99999] overflow-hidden';
            const handDrawnIcons = ['#icon-cf-heart', '#icon-cf-star', '#icon-cf-flower', '#icon-cf-sparkle', '#icon-paw'];
            for(let i=0; i<60; i++) {
                let el = document.createElement('div'); 
                let iconId = handDrawnIcons[Math.floor(Math.random() * handDrawnIcons.length)];
                
                el.className = 'confetti-flake w-7 h-7 flex items-center justify-center shrink-0';
                if(iconId === '#icon-paw') el.classList.add('text-pink-300');
                
                el.innerHTML = `<svg class="w-full h-full shrink-0"><use href="${iconId}"></use></svg>`;
                el.style.left = (Math.random() * 100) + 'vw'; 
                el.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
                el.style.animationDelay = (Math.random() * 1) + 's';
                container.appendChild(el);
            }
            document.body.appendChild(container); showToast('太棒啦！达成一万步！'); setTimeout(() => container.remove(), 5500);
        }

        async function submitSport() {
            let steps = document.getElementById('sp-steps').value;
            if(!curSport && !steps) return showToast('选个运动或输入步数呀'); 
            
            const targetDate = document.getElementById('sport-date').value || fmtDate(new Date());
            let d = (await DB.get('daily', targetDate)) || {date: targetDate}; 
            if(!d.sport) d.sport = []; 
            if(curSport) { const dur = document.getElementById('sp-dur').value; if(!dur) return showToast('动了多久？'); d.sport.push({ type: curSport, dur: dur, cal: document.getElementById('sp-cal').value || 0 }); }
            if(steps) { d.sport.push({ type: '步数', dur: steps+'步', cal: Math.floor(steps/30) }); }
            await DB.put('daily', d); showToast(`汗水已凝结在日历上`); 
            document.getElementById('sp-dur').value = ''; document.getElementById('sp-cal').value = ''; document.getElementById('sp-steps').value = ''; updatePawProgress();
        }

        async function renderChart() {
            const y = currDate.getFullYear(), m = currDate.getMonth() + 1;
            document.getElementById('month-name-display').textContent = `${y}/${String(m).padStart(2,'0')}`;
            const allData = await DB.getAll('daily');
            let sortedData = allData.filter(d => d.period).sort((a,b) => new Date(a.date) - new Date(b.date));
            let periodStarts = [];
            for(let i=0; i<sortedData.length; i++) { let cur = new Date(sortedData[i].date); if(i === 0) { periodStarts.push(cur); continue; } let prev = new Date(sortedData[i-1].date); let diff = (cur - prev) / (1000 * 60 * 60 * 24); if(diff > 5) periodStarts.push(cur); }
            let cycles = []; for(let i=0; i<periodStarts.length-1; i++) { let diff = Math.round((periodStarts[i+1] - periodStarts[i]) / (1000 * 60 * 60 * 24)); cycles.push({ yyyyMm: fmtDate(periodStarts[i]).slice(0,7), length: diff }); }
            let labels = []; let cycleDays = []; let sportMins = [];
            for (let i = 5; i >= 0; i--) {
                let d = new Date(y, currDate.getMonth() - i, 1); let mStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; labels.push(`${d.getMonth()+1}月`);
                let cycleInMonth = cycles.find(c => c.yyyyMm === mStr); cycleDays.push(cycleInMonth ? cycleInMonth.length : null);
                let monthData = allData.filter(x => x.date.startsWith(mStr)); let mSport = 0;
                monthData.forEach(day => { if(day.sport) day.sport.forEach(s => { if(s.type!=='步数') mSport += parseInt(s.dur||0) }) }); sportMins.push(mSport);
            }
            if(chartObj) chartObj.destroy();
            chartObj = new Chart(document.getElementById('chart-magic').getContext('2d'), { type: 'bar', data: { labels: labels, datasets: [ { type: 'line', label: '周期天数', data: cycleDays, borderColor: '#F43F5E', backgroundColor: 'white', borderWidth: 3, tension: 0.4, yAxisID: 'y1', pointRadius: 5, spanGaps: true }, { type: 'bar', label: '总运动(分)', data: sportMins, backgroundColor: '#D1FAE5', borderRadius: 6, yAxisID: 'y' } ] }, options: { responsive: true, maintainAspectRatio: false, scales: { y1: { type: 'linear', display: true, position: 'left', min: 20, max: 60, title: {display: true, text: '天数', font: {size: 10}} }, y: { type: 'linear', display: true, position: 'right', grid: { drawOnChartArea: false }, title: {display: true, text: '运动分钟', font: {size: 10}} } }, plugins: { legend: { position: 'bottom', labels: {font:{family: 'ZCOOL QingKe HuangYou'}} } } } });
            const prefix = `${y}-${String(m).padStart(2,'0')}`; const curMonthData = allData.filter(d => d.date.startsWith(prefix));
            let totDur = 0; let totCal = 0; let typeSum = {}; let dailyHTML = '';
            curMonthData.sort((a,b)=> new Date(b.date) - new Date(a.date)).forEach(d => {
                if(d.sport && d.sport.length > 0) {
                    d.sport.forEach(s => {
                        let isSteps = s.type === '步数';
                        if(!isSteps) totDur += parseInt(s.dur); 
                        totCal += parseInt(s.cal);
                        if(!typeSum[s.type]) typeSum[s.type] = {dur: 0, cal: 0};
                        if(!isSteps) typeSum[s.type].dur += parseInt(s.dur);
                        typeSum[s.type].cal += parseInt(s.cal);
                        let miniId = isSteps ? 'icon-paw' : getMiniSportIconId(s.type);
                        let durStr = isSteps ? s.dur : s.dur+'m';
                        dailyHTML += `<li class="flex justify-between items-center bg-gray-50 p-2 rounded-xl border border-gray-200"><div class="flex items-center gap-2 text-theme-ink shrink-0 whitespace-nowrap"><svg class="w-5 h-5 shrink-0"><use href="#${miniId}"></use></svg><span>${s.type} <span class="text-xs font-normal text-theme-ink/50 ml-1">(${dispDate(d.date).slice(5)})</span></span></div><span class="text-theme-red whitespace-nowrap shrink-0">${durStr} / ${s.cal}k</span></li>`;
                    });
                }
            });
            document.getElementById('sp-tot').textContent = `${totDur}分钟 / ${totCal}千卡`;
            document.getElementById('sport-list').innerHTML = dailyHTML || '<li class="text-center text-theme-ink/50 py-4 whitespace-nowrap">本月还没流汗呢~</li>';
            let typeHTML = '';
            for (let t in typeSum) { 
                let isSteps = t === '步数'; let miniId = isSteps ? 'icon-paw' : getMiniSportIconId(t);
                let durStr = isSteps ? '计步' : typeSum[t].dur+'m';
                typeHTML += `<div class="bg-theme-mint/30 p-2 rounded-xl border border-gray-200 flex flex-col items-center justify-center text-theme-ink"><div class="flex items-center gap-1 whitespace-nowrap"><svg class="w-4 h-4 shrink-0"><use href="#${miniId}"></use></svg>${t}</div><div class="text-[11px] mt-1 text-theme-ink/70 font-bold whitespace-nowrap">${durStr} / ${typeSum[t].cal}k</div></div>`; 
            }
            document.getElementById('sport-type-summary').innerHTML = typeHTML || '<div class="col-span-2 text-center text-xs text-theme-ink/50 whitespace-nowrap">无数据</div>';
        }

        window.onload = async () => { await DB.init(); switchTab('calendar'); };
    </script>
